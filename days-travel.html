<!doctype html>
<html lang="zh-CN" data-lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>途中一页 · TEMPO</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Liu+Jian+Mao+Cao&family=Long+Cang&display=swap" rel="stylesheet" />
<style>
  :root {
    /* paper & ink — travel: 暖陶土 */
    --paper:        #F2DECC;
    --paper-deep:   #E2C7A9;
    --paper-soft:   #F8E8D5;
    --paper-warm:   #ECD3B8;
    --ink:          #1B1714;
    --ink-soft:     #4B3526;
    --ink-faint:    #9C7B5E;
    --rule:         #D7BB99;

    /* travel accent: 陶土红 */
    --accent:       #B5503D;
    --accent-deep:  #843324;
    --accent-wash:  #D9907F;

    --serif-zh: "Noto Serif SC", "Songti SC", "STSong", serif;
    --serif-en: "Cormorant Garamond", "Noto Serif SC", serif;
    --hand:     "Liu Jian Mao Cao", "Noto Serif SC", cursive;
    --hand-2:   "Long Cang", "Noto Serif SC", cursive;

    --max:  1280px;
    --gut:  clamp(20px, 4vw, 56px);
    --nav-h: 56px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--serif-zh);
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    line-height: 1.7;
    overflow-x: hidden;
  }
  body::before {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    background-image:
      radial-gradient(rgba(80,40,20,0.025) 1px, transparent 1px),
      radial-gradient(rgba(80,40,20,0.018) 1px, transparent 1px);
    background-size: 3px 3px, 5px 5px;
    background-position: 0 0, 1px 2px;
    mix-blend-mode: multiply;
    z-index: 1;
  }
  a { color: inherit; text-decoration: none; }

  /* ───────────── nav ───────────── */
  .nav {
    position: fixed; top: 0; left: 0; right: 0;
    height: var(--nav-h);
    display: flex; align-items: center;
    padding: 0 var(--gut);
    z-index: 50;
    transition: transform .45s ease, background-color .45s ease, backdrop-filter .45s ease, border-color .45s ease;
    border-bottom: 1px solid transparent;
  }
  .nav.scrolled {
    background: rgba(242, 222, 204, 0.78);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-bottom-color: var(--rule);
  }
  .nav.hidden { transform: translateY(-100%); }
  .nav-inner {
    width: 100%; max-width: var(--max); margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    gap: 24px;
  }
  .brand {
    font-family: var(--serif-en);
    font-size: 18px; letter-spacing: 0.32em;
    font-weight: 400; text-transform: uppercase;
    color: var(--ink);
  }
  .brand .dot { display: inline-block; width: 5px; height: 5px;
    background: var(--ink); border-radius: 50%;
    transform: translateY(-2px); margin: 0 8px; }
  .brand .zh { font-family: var(--serif-zh); letter-spacing: 0.4em; font-size: 14px; color: var(--ink-soft); }
  .nav-links { display: flex; align-items: center; gap: 28px;
    font-size: 13.5px; color: var(--ink-soft); font-weight: 400; }
  .nav-links a { position: relative; padding: 4px 0; transition: color .25s ease; }
  .nav-links a::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: -2px;
    height: 1px; background: var(--ink);
    transform: scaleX(0); transform-origin: left;
    transition: transform .35s ease;
  }
  .nav-links a:hover { color: var(--ink); }
  .nav-links a:hover::after { transform: scaleX(1); }
  .nav-links a.is-active { color: var(--ink); }
  .nav-links a.is-active::after { transform: scaleX(1); background: var(--accent); }

  .lang {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--serif-en); font-size: 12px;
    letter-spacing: 0.2em; color: var(--ink-faint);
    cursor: pointer; user-select: none;
    border: none; background: none; padding: 4px 8px;
  }
  .lang span { transition: color .25s ease; }
  .lang .active { color: var(--ink); }
  .lang .sep { color: var(--ink-faint); }

  /* ───────────── breadcrumb ───────────── */
  .crumb {
    max-width: var(--max);
    margin: 0 auto;
    padding: calc(var(--nav-h) + 32px) var(--gut) 0;
    display: flex; align-items: center; gap: 14px;
    font-family: var(--serif-en);
    font-size: 11.5px;
    letter-spacing: 0.4em;
    color: var(--ink-faint);
    text-transform: uppercase;
  }
  .crumb a { transition: color .25s ease; }
  .crumb a:hover { color: var(--ink); }
  .crumb .sep { width: 18px; height: 1px; background: var(--ink-faint); display: inline-block; }

  /* ───────────── diary head (slim) ───────────── */
  .diary-head {
    max-width: 980px;
    margin: 0 auto;
    padding: calc(var(--nav-h) + 36px) var(--gut) 7vh;
    display: flex; flex-direction: column;
    align-items: flex-start;
    gap: 6px;
  }
  .diary-back {
    font-family: var(--serif-en);
    font-size: 11px; letter-spacing: 0.35em;
    color: var(--ink-faint);
    text-transform: uppercase;
    padding: 4px 0;
    transition: color .25s ease;
  }
  .diary-back:hover { color: var(--accent-deep); }
  .diary-name {
    font-family: var(--serif-zh);
    font-weight: 400;
    font-size: clamp(22px, 2.1vw, 28px);
    letter-spacing: 0.32em;
    margin: 6px 0 0;
    color: var(--ink);
    line-height: 1.2;
  }
  [data-lang="en"] .diary-name {
    font-family: var(--serif-en); font-style: italic; letter-spacing: 0.04em;
  }
  .diary-en {
    font-family: var(--serif-en);
    font-style: italic;
    font-size: 12px; letter-spacing: 0.22em;
    color: var(--ink-faint);
    text-transform: lowercase;
  }
  [data-lang="en"] .diary-en { display: none; }

  /* ───────────── hero ───────────── */
  .hero {
    max-width: var(--max);
    margin: 0 auto;
    padding: 4vh var(--gut) 8vh;
    display: grid;
    grid-template-columns: 1fr 1.05fr;
    gap: clamp(40px, 6vw, 80px);
    align-items: center;
  }
  .hero-art {
    position: relative;
    aspect-ratio: 5 / 4;
    width: 100%;
    max-height: 60vh;
    overflow: hidden;
    background: var(--paper-soft);
  }
  .hero-art svg.wash { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

  .section-mark {
    font-family: var(--serif-en);
    font-size: 11px; letter-spacing: 0.5em;
    color: var(--ink-faint);
    text-transform: uppercase;
    margin-bottom: 22px;
  }
  .hero-title {
    font-family: var(--serif-zh);
    font-weight: 400;
    font-size: clamp(40px, 5.4vw, 68px);
    line-height: 1.1;
    letter-spacing: 0.4em;
    margin: 0 0 12px;
    color: var(--ink);
  }
  .hero-title-en {
    font-family: var(--serif-en);
    font-style: italic;
    font-weight: 300;
    font-size: clamp(18px, 1.8vw, 22px);
    letter-spacing: 0.2em;
    color: var(--ink-soft);
    margin-bottom: 28px;
  }
  .hero-divider { width: 38px; height: 1px; background: var(--accent); opacity: 0.6; margin: 0 0 24px; }
  .hero-prose {
    font-size: clamp(14.5px, 1.1vw, 16px);
    line-height: 2.1;
    color: var(--ink-soft);
    max-width: 38ch;
    font-weight: 300;
  }
  .hero-prose p + p { margin-top: 1em; }
  .hero-prose .accent { font-family: var(--hand); font-size: 1.3em; color: var(--accent); line-height: 1.5; }

  /* ───────────── log feed ───────────── */
  .log-head {
    max-width: var(--max);
    margin: 4vh auto 5vh;
    padding: 0 var(--gut);
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 24px;
  }
  .log-head .label {
    font-family: var(--serif-zh);
    font-weight: 300;
    font-size: 18px;
    letter-spacing: 0.5em;
    margin: 0;
  }
  .log-head .meta {
    font-family: var(--serif-en);
    font-size: 11px; letter-spacing: 0.4em;
    color: var(--ink-faint);
    text-transform: uppercase;
  }

  .feed {
    max-width: 980px;
    margin: 0 auto;
    padding: 0 var(--gut) 16vh;
    display: flex; flex-direction: column;
    gap: clamp(64px, 9vh, 110px);
  }

  .entry {
    display: grid;
    grid-template-columns: 1.25fr 1fr;
    gap: clamp(32px, 5vw, 64px);
    align-items: center;
  }
  .entry.flip { grid-template-columns: 1fr 1.25fr; }
  .entry.flip .entry-art { order: 2; }
  .entry.flip .entry-text { order: 1; }

  .entry-art {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    overflow: hidden;
    background: var(--paper-warm);
    box-shadow: 0 18px 30px -22px rgba(80,40,20,0.32);
    transition: transform .8s cubic-bezier(.2,.7,.2,1);
  }
  .entry:hover .entry-art { transform: translateY(-3px); }
  .entry-art svg { width: 100%; height: 100%; display: block; }

  /* postmark stamp on the thumbnail — top-left circular badge with place name */
  .stamp {
    position: absolute;
    top: 14px; left: 14px;
    width: 76px; height: 76px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--accent);
    background: rgba(248, 232, 213, 0.8);
    border: 1.5px solid var(--accent);
    border-radius: 50%;
    backdrop-filter: blur(2px);
    text-align: center;
    line-height: 1.1;
    transform: rotate(-8deg);
    opacity: 0.9;
  }
  .stamp .top {
    font-family: var(--serif-en);
    font-style: italic;
    font-size: 9.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .stamp .mid {
    font-family: var(--brush, "Ma Shan Zheng"), var(--serif-zh);
    font-size: 14px;
    letter-spacing: 0.08em;
    margin: 4px 0 2px;
    font-weight: 500;
  }
  [data-lang="en"] .stamp .mid {
    font-family: var(--serif-en); font-style: italic; font-size: 13px; letter-spacing: 0.05em;
  }
  .stamp .bot {
    font-family: var(--serif-en);
    font-size: 8.5px;
    letter-spacing: 0.14em;
    color: var(--accent-deep);
    opacity: 0.85;
  }

  /* play hint — bottom-right */
  .entry-art .play {
    position: absolute;
    right: 14px; bottom: 14px;
    width: 36px; height: 36px;
    border: 1px solid rgba(255,255,255,0.6);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(2px);
    background: rgba(0,0,0,0.18);
    transition: background .35s ease;
  }
  .entry-art .play::before {
    content: "";
    width: 0; height: 0;
    border-left: 8px solid #fff;
    border-top: 5px solid transparent;
    border-bottom: 5px solid transparent;
    margin-left: 2px;
  }
  .entry:hover .entry-art .play { background: rgba(0,0,0,0.32); }

  .entry-text {
    display: flex; flex-direction: column;
    gap: 14px;
  }
  .entry-date {
    font-family: var(--serif-en);
    font-style: italic;
    font-size: 13px; letter-spacing: 0.18em;
    color: var(--ink-faint);
  }
  .entry-title {
    font-family: var(--serif-zh);
    font-weight: 400;
    font-size: clamp(22px, 2vw, 28px);
    letter-spacing: 0.18em;
    color: var(--ink);
    margin: 0;
    line-height: 1.4;
  }
  .entry-note {
    font-family: var(--hand);
    font-size: 17px;
    color: var(--accent-deep);
    line-height: 1.7;
    letter-spacing: 0.04em;
    margin-top: 4px;
  }
  [data-lang="en"] .entry-note { font-family: var(--serif-en); font-style: italic; font-size: 15px; color: var(--accent-deep); letter-spacing: 0.04em; }

  .entry-place {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: var(--serif-en);
    font-size: 11px; letter-spacing: 0.32em;
    color: var(--ink-faint);
    text-transform: uppercase;
    margin-top: 4px;
  }
  .entry-place::before {
    content: ""; display: inline-block;
    width: 18px; height: 1px; background: var(--ink-faint);
  }

  .entry-links {
    display: flex; align-items: center; gap: 18px;
    margin-top: 12px;
  }
  .link-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 16px;
    border: 1px solid var(--accent);
    color: var(--accent-deep);
    font-family: var(--serif-zh);
    font-size: 13px;
    letter-spacing: 0.18em;
    transition: background .35s ease, color .35s ease;
  }
  [data-lang="en"] .link-btn { font-family: var(--serif-en); letter-spacing: 0.1em; font-style: italic; }
  .link-btn:hover { background: var(--accent); color: var(--paper-soft); }
  .link-btn .arrow { font-family: var(--serif-en); font-size: 14px; }

  .link-secondary {
    font-family: var(--serif-en);
    font-style: italic;
    font-size: 12px; letter-spacing: 0.16em;
    color: var(--ink-faint);
    transition: color .25s ease;
    border-bottom: 1px solid transparent;
    padding-bottom: 1px;
  }
  .link-secondary:hover { color: var(--accent-deep); border-bottom-color: var(--accent); }

  /* ───────────── reveal anim ───────────── */
  .reveal {
    opacity: 0; transform: translateY(28px);
    transition: opacity 1.1s ease, transform 1.1s cubic-bezier(.2,.7,.2,1);
  }
  .reveal.in { opacity: 1; transform: translateY(0); }
  .reveal.delay-1 { transition-delay: .14s; }
  .reveal.delay-2 { transition-delay: .28s; }
  .reveal.delay-3 { transition-delay: .42s; }

  /* ───────────── i18n ───────────── */
  [data-lang="zh"] .en-only { display: none; }
  [data-lang="en"] .zh-only { display: none; }
  [data-lang="en"] body { font-family: var(--serif-en); }
  [data-lang="en"] .nav-links a, [data-lang="en"] .hero-prose, [data-lang="en"] .entry-title {
    font-family: var(--serif-en);
  }
  [data-lang="en"] .entry-title { letter-spacing: 0.04em; font-style: italic; }
  [data-lang="en"] .hero-title { display: none; }
  [data-lang="en"] .hero-title-en { font-style: normal; font-weight: 300; }
  [data-lang="en"] .log-head .label { font-family: var(--serif-en); font-style: italic; letter-spacing: 0.18em; }
  [data-lang="en"] .brand .zh { display: none; }

  /* ───────────── responsive ───────────── */
  @media (max-width: 760px) {
    .entry, .entry.flip {
      grid-template-columns: 1fr;
      gap: 24px;
    }
    .entry.flip .entry-art { order: 1; }
    .entry.flip .entry-text { order: 2; }
    .hero { grid-template-columns: 1fr; padding-top: 0; gap: 36px; }
    .hero-art { aspect-ratio: 4 / 4; max-height: 52vh; }
    .nav-links a:not(.lang-wrap) { display: none; }
  }
</style>
</head>
<body>

<!-- shared SVG defs -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <filter id="noise-soft" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="4" />
      <feColorMatrix values="0 0 0 0 0.10  0 0 0 0 0.09  0 0 0 0 0.08  0 0 0 0.05 0" />
      <feComposite in2="SourceGraphic" operator="in" />
    </filter>
    <filter id="noise-fine" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="1.4" numOctaves="2" seed="9" />
      <feColorMatrix values="0 0 0 0 0.12  0 0 0 0 0.10  0 0 0 0 0.08  0 0 0 0.04 0" />
      <feComposite in2="SourceGraphic" operator="in" />
    </filter>
    <filter id="bleed-light" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="5" />
      <feDisplacementMap in="SourceGraphic" scale="9" />
    </filter>
  </defs>
</svg>

<nav class="nav" id="nav">

<script>
  /* ─────────────────────────────────────────
     Travel scene generator
  ───────────────────────────────────────── */

  const palette = {
    sky:  "#F8E8D5",
    soft: "#E2C7A9",
    deep: "#5A2A1B",
    warm: "#B5503D",
    earth:"#843324",
    cream:"#F8EFD7",
    moss: "#6E7A45",
  };

  const scenes = {
    mountainView() {
      return `
        <defs>
          <linearGradient id="t-sky-1" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"  stop-color="${palette.sky}"/>
            <stop offset="100%" stop-color="${palette.soft}"/>
          </linearGradient>
        </defs>
        <rect width="800" height="450" fill="url(#t-sky-1)"/>
        <!-- mountain layers -->
        <g filter="url(#bleed-light)">
          <path d="M 0 280 Q 200 220 400 270 T 800 260 L 800 320 L 0 320 Z" fill="${palette.warm}" opacity="0.6"/>
        </g>
        <g filter="url(#bleed-light)">
          <path d="M 0 340 Q 220 290 460 330 T 800 320 L 800 400 L 0 400 Z" fill="${palette.earth}" opacity="0.7"/>
        </g>
        <g filter="url(#bleed-light)">
          <path d="M 0 410 Q 230 380 500 405 T 800 390 L 800 450 L 0 450 Z" fill="${palette.deep}" opacity="0.85"/>
        </g>
        <g filter="url(#bleed-light)" opacity="0.6"><circle cx="600" cy="140" r="42" fill="${palette.cream}"/></g>
        <rect width="800" height="450" filter="url(#noise-fine)" opacity="0.55"/>`;
    },
    seasideEvening() {
      return `
        <defs>
          <linearGradient id="t-sea" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"  stop-color="${palette.cream}"/>
            <stop offset="55%" stop-color="${palette.warm}" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="${palette.deep}"/>
          </linearGradient>
        </defs>
        <rect width="800" height="450" fill="url(#t-sea)"/>
        <!-- sun at horizon -->
        <g filter="url(#bleed-light)" opacity="0.85"><circle cx="400" cy="280" r="48" fill="${palette.cream}"/></g>
        <!-- horizon line -->
        <line x1="0" y1="280" x2="800" y2="280" stroke="${palette.deep}" stroke-width="0.6" opacity="0.5"/>
        <!-- water shimmer -->
        <g stroke="${palette.cream}" stroke-width="0.5" fill="none" opacity="0.55">
          ${Array.from({length: 12}).map((_, i) =>
            `<path d="M 0 ${300+i*12} q 200 ${i%2? -4 : 4} 400 0 t 400 0"/>`
          ).join("")}
        </g>
        <rect width="800" height="450" filter="url(#noise-fine)" opacity="0.55"/>`;
    },
    trainWindow() {
      return `
        <rect width="800" height="450" fill="${palette.soft}"/>
        <!-- inside cabin warm tone -->
        <rect width="800" height="450" fill="${palette.warm}" opacity="0.18"/>
        <!-- big window frame -->
        <rect x="80" y="60" width="640" height="330" fill="${palette.cream}" opacity="0.9"/>
        <rect x="80" y="60" width="640" height="330" fill="none" stroke="${palette.earth}" stroke-width="3" opacity="0.55"/>
        <!-- landscape outside -->
        <g filter="url(#bleed-light)">
          <rect x="80" y="60" width="640" height="180" fill="${palette.sky}"/>
          <path d="M 80 240 Q 280 200 480 230 T 720 220 L 720 280 L 80 280 Z" fill="${palette.warm}" opacity="0.6"/>
          <path d="M 80 280 Q 280 250 480 275 T 720 270 L 720 390 L 80 390 Z" fill="${palette.earth}" opacity="0.7"/>
        </g>
        <!-- motion blur lines suggesting train speed -->
        <g stroke="${palette.deep}" stroke-width="0.4" opacity="0.3">
          <line x1="100" y1="320" x2="200" y2="316"/>
          <line x1="220" y1="340" x2="340" y2="334"/>
          <line x1="500" y1="350" x2="600" y2="346"/>
        </g>
        <!-- small reflection / curtain hint on right edge -->
        <rect x="660" y="60" width="60" height="330" fill="${palette.deep}" opacity="0.18"/>
        <rect width="800" height="450" filter="url(#noise-fine)" opacity="0.55"/>`;
    },
    backstreet() {
      return `
        <rect width="800" height="450" fill="${palette.sky}"/>
        <!-- ground stone -->
        <rect y="320" width="800" height="130" fill="${palette.soft}" opacity="0.85"/>
        <!-- buildings on both sides forming alley -->
        <g fill="${palette.warm}" opacity="0.7">
          <polygon points="0,80 0,450 280,450 280,200"/>
        </g>
        <g fill="${palette.earth}" opacity="0.7">
          <polygon points="800,60 800,450 540,450 540,180"/>
        </g>
        <!-- doors and windows -->
        <g fill="${palette.deep}" opacity="0.7">
          <rect x="80" y="280" width="40" height="80"/>
          <rect x="170" y="260" width="36" height="36"/>
          <rect x="600" y="270" width="40" height="80"/>
          <rect x="700" y="240" width="36" height="36"/>
        </g>
        <!-- distant figure walking -->
        <g fill="${palette.deep}" opacity="0.65">
          <ellipse cx="408" cy="280" rx="6" ry="8"/>
          <rect x="404" y="288" width="8" height="22"/>
        </g>
        <!-- string lights overhead -->
        <path d="M 280 100 Q 400 130 540 100" stroke="${palette.deep}" stroke-width="0.6" fill="none" opacity="0.6"/>
        <g fill="${palette.cream}" opacity="0.85">
          <circle cx="320" cy="115" r="3"/>
          <circle cx="380" cy="123" r="3"/>
          <circle cx="440" cy="123" r="3"/>
          <circle cx="500" cy="115" r="3"/>
        </g>
        <rect width="800" height="450" filter="url(#noise-fine)" opacity="0.55"/>`;
    },
    hostelMorning() {
      return `
        <rect width="800" height="450" fill="${palette.sky}"/>
        <!-- bed -->
        <rect x="100" y="280" width="600" height="120" fill="${palette.cream}" opacity="0.95"/>
        <rect x="100" y="280" width="600" height="14" fill="${palette.warm}" opacity="0.7"/>
        <!-- tossed sheet folds -->
        <g stroke="${palette.warm}" stroke-width="0.6" fill="none" opacity="0.5">
          <path d="M 130 320 q 120 -8 240 0 t 240 0"/>
          <path d="M 150 350 q 100 -6 200 0 t 200 0"/>
        </g>
        <!-- pillow -->
        <g fill="${palette.warm}" opacity="0.55">
          <rect x="140" y="290" width="160" height="48" rx="8"/>
        </g>
        <!-- light from upper-right window -->
        <g filter="url(#bleed-light)" opacity="0.6">
          <polygon points="600,0 800,0 800,260 540,300" fill="${palette.cream}"/>
        </g>
        <!-- backpack on the floor right -->
        <g fill="${palette.deep}" opacity="0.85">
          <rect x="640" y="350" width="60" height="60" rx="6"/>
          <rect x="650" y="338" width="40" height="14" rx="3"/>
        </g>
        <rect width="800" height="450" filter="url(#noise-fine)" opacity="0.55"/>`;
    },
    nightStreet() {
      return `
        <rect width="800" height="450" fill="${palette.deep}"/>
        <!-- wet street reflections -->
        <rect y="300" width="800" height="150" fill="#1B1714" opacity="0.6"/>
        <!-- distant warm shop windows -->
        <g fill="${palette.warm}" opacity="0.85">
          <rect x="60"  y="220" width="80" height="60"/>
          <rect x="160" y="200" width="60" height="80"/>
          <rect x="260" y="230" width="100" height="50"/>
          <rect x="500" y="210" width="80" height="70"/>
          <rect x="620" y="230" width="60" height="50"/>
        </g>
        <!-- reflections on wet ground -->
        <g fill="${palette.warm}" opacity="0.45">
          <rect x="60"  y="280" width="80" height="80"/>
          <rect x="160" y="280" width="60" height="100"/>
          <rect x="260" y="280" width="100" height="70"/>
          <rect x="500" y="280" width="80" height="90"/>
          <rect x="620" y="280" width="60" height="70"/>
        </g>
        <!-- a paper lantern -->
        <g filter="url(#bleed-light)" opacity="0.85">
          <ellipse cx="400" cy="160" rx="22" ry="28" fill="${palette.cream}"/>
        </g>
        <line x1="400" y1="0" x2="400" y2="132" stroke="${palette.cream}" stroke-width="0.6" opacity="0.5"/>
        <rect width="800" height="450" filter="url(#noise-fine)" opacity="0.55"/>`;
    },
    teaCafe() {
      return `
        <rect width="800" height="450" fill="${palette.sky}"/>
        <!-- table top-down -->
        <rect width="800" height="450" fill="${palette.soft}" opacity="0.85"/>
        <!-- a small notebook -->
        <g filter="url(#bleed-light)">
          <rect x="200" y="120" width="220" height="280" fill="${palette.cream}"/>
        </g>
        <line x1="310" y1="120" x2="310" y2="400" stroke="${palette.deep}" stroke-width="0.5" opacity="0.5"/>
        <!-- handwritten lines -->
        <g stroke="${palette.deep}" stroke-width="0.6" opacity="0.5">
          <line x1="220" y1="160" x2="290" y2="160"/>
          <line x1="220" y1="180" x2="290" y2="180"/>
          <line x1="220" y1="200" x2="290" y2="200"/>
          <line x1="320" y1="160" x2="400" y2="160"/>
          <line x1="320" y1="180" x2="400" y2="180"/>
        </g>
        <!-- a tea cup with steam -->
        <g fill="${palette.warm}" opacity="0.85">
          <ellipse cx="540" cy="280" rx="60" ry="14"/>
          <path d="M 480 280 q 0 -50 60 -50 q 60 0 60 50 z"/>
        </g>
        <g stroke="${palette.deep}" stroke-width="0.8" fill="none" opacity="0.5">
          <path d="M 530 220 q -8 -14 4 -26 q 12 -10 -2 -22"/>
          <path d="M 555 218 q 6 -12 -2 -22"/>
        </g>
        <!-- a pen -->
        <g opacity="0.7">
          <line x1="450" y1="380" x2="540" y2="350" stroke="${palette.deep}" stroke-width="3" stroke-linecap="round"/>
          <line x1="445" y1="382" x2="455" y2="378" stroke="${palette.warm}" stroke-width="3" stroke-linecap="round"/>
        </g>
        <rect width="800" height="450" filter="url(#noise-fine)" opacity="0.55"/>`;
    },
    hikePath() {
      return `
        <rect width="800" height="450" fill="${palette.sky}"/>
        <!-- path going up -->
        <g filter="url(#bleed-light)">
          <polygon points="380,450 460,450 540,200 520,200" fill="${palette.warm}" opacity="0.7"/>
        </g>
        <!-- ground -->
        <g fill="${palette.moss}" opacity="0.55">
          <polygon points="0,360 380,450 0,450"/>
          <polygon points="800,360 460,450 800,450"/>
        </g>
        <!-- distant rolling hills -->
        <g filter="url(#bleed-light)" opacity="0.7">
          <path d="M 0 240 Q 200 200 400 230 T 800 220 L 800 300 L 0 300 Z" fill="${palette.earth}" opacity="0.65"/>
        </g>
        <!-- some pine silhouettes -->
        <g fill="${palette.deep}" opacity="0.7">
          <polygon points="120,260 140,200 160,260"/>
          <polygon points="180,280 200,210 220,280"/>
          <polygon points="640,260 660,200 680,260"/>
          <polygon points="700,280 720,205 740,280"/>
        </g>
        <!-- morning mist -->
        <g filter="url(#bleed-light)" opacity="0.45">
          <ellipse cx="400" cy="270" rx="380" ry="18" fill="${palette.cream}"/>
        </g>
        <rect width="800" height="450" filter="url(#noise-fine)" opacity="0.55"/>`;
    },
  };

  function placeholderSVG(scene) {
    const inner = scenes[scene]();
    return `<svg viewBox="0 0 800 450" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">${inner}</svg>`;
  }

  /* ─────────────────────────────────────────
     7 entries — travel vlogs
  ───────────────────────────────────────── */
  const entries = [
    {
      date: "2025.04.06",
      scene: "seasideEvening",
      titleZh: "海边的最后一晚",
      titleEn: "The last evening by the sea",
      noteZh: "回去再说吧，今晚不想想。",
      noteEn: "We'll deal with it back home — not tonight.",
      placeZh: "霞 浦", placeEn: "Xiapu",
      stampTopZh: "途中", stampTopEn: "EN ROUTE",
      bili: "#", xhs: "#",
    },
    {
      date: "2025.03.20",
      scene: "mountainView",
      titleZh: "山里走了三天",
      titleEn: "Three days in the mountains",
      noteZh: "下山的时候腿在抖，但心是稳的。",
      noteEn: "Legs shook coming down — heart was steady.",
      placeZh: "终南", placeEn: "Zhongnan",
      stampTopZh: "途中", stampTopEn: "EN ROUTE",
      bili: "#", xhs: "#",
    },
    {
      date: "2025.02.14",
      scene: "trainWindow",
      titleZh: "高铁五个小时",
      titleEn: "Five hours on the train",
      noteZh: "把书读完了，云也看完了。",
      noteEn: "Finished the book. Finished the clouds.",
      placeZh: "京沪线", placeEn: "BJS-SHA",
      stampTopZh: "途中", stampTopEn: "EN ROUTE",
      bili: "#", xhs: "#",
    },
    {
      date: "2025.01.29",
      scene: "backstreet",
      titleZh: "胡同乱走的下午",
      titleEn: "An afternoon lost in the alleys",
      noteZh: "迷路那次拍到了最好的几张。",
      noteEn: "The best frames came when I was lost.",
      placeZh: "北 京", placeEn: "Beijing",
      stampTopZh: "途中", stampTopEn: "EN ROUTE",
      bili: "#", xhs: "#",
    },
    {
      date: "2024.12.10",
      scene: "nightStreet",
      titleZh: "雨后的小街",
      titleEn: "A small street after the rain",
      noteZh: "灯都倒在地上，没有踩上去。",
      noteEn: "All the lights pooled in the ground — I stepped around them.",
      placeZh: "京 都", placeEn: "Kyoto",
      stampTopZh: "途中", stampTopEn: "EN ROUTE",
      bili: "#", xhs: "#",
    },
    {
      date: "2024.11.18",
      scene: "hikePath",
      titleZh: "周末短徒步",
      titleEn: "A short weekend hike",
      noteZh: "山顶其实没什么 —— 上山才有。",
      noteEn: "There was nothing at the top — the climb was the thing.",
      placeZh: "莫干山", placeEn: "Moganshan",
      stampTopZh: "途中", stampTopEn: "EN ROUTE",
      bili: "#", xhs: "#",
    },
    {
      date: "2024.10.04",
      scene: "teaCafe",
      titleZh: "咖啡馆里写两小时",
      titleEn: "Two hours of writing in a café",
      noteZh: "邻桌的老人喝完了三杯。",
      noteEn: "The old man next to me finished three cups.",
      placeZh: "成 都", placeEn: "Chengdu",
      stampTopZh: "途中", stampTopEn: "EN ROUTE",
      bili: "#", xhs: "#",
    },
  ];

  /* ─────────────────────────────────────────
     Render feed — alternating layout
  ───────────────────────────────────────── */
  const feedEl = document.getElementById("feed");
  entries.forEach((e, i) => {
    const node = document.createElement("article");
    node.className = "entry reveal" + (i % 2 ? " flip" : "");
    if (i % 3 === 1) node.classList.add("delay-1");
    if (i % 3 === 2) node.classList.add("delay-2");
    node.innerHTML = `
      <a class="entry-art" href="${e.bili}" target="_blank" rel="noopener" aria-label="${e.titleZh}">
        ${placeholderSVG(e.scene)}
        <div class="stamp" aria-hidden="true">
          <div class="top"><span class="zh-only">${e.stampTopZh}</span><span class="en-only">${e.stampTopEn}</span></div>
          <div class="mid"><span class="zh-only">${e.placeZh}</span><span class="en-only">${e.placeEn}</span></div>
          <div class="bot">${e.date.slice(0,4)}</div>
        </div>
        <span class="play" aria-hidden="true"></span>
      </a>
      <div class="entry-text">
        <span class="entry-date">${e.date}</span>
        <h3 class="entry-title"><span class="zh-only">${e.titleZh}</span><span class="en-only">${e.titleEn}</span></h3>
        <p class="entry-note"><span class="zh-only">${e.noteZh}</span><span class="en-only">${e.noteEn}</span></p>
        <span class="entry-place"><span class="zh-only">${e.placeZh}</span><span class="en-only">${e.placeEn}</span></span>
        <div class="entry-links">
          <a class="link-btn" href="${e.bili}" target="_blank" rel="noopener">
            <span><span class="zh-only">B站观看</span><span class="en-only">watch on Bilibili</span></span>
            <span class="arrow">→</span>
          </a>
          <a class="link-secondary" href="${e.xhs}" target="_blank" rel="noopener"><span class="zh-only">小红书</span><span class="en-only">also on Xiaohongshu</span></a>
        </div>
      </div>
    `;
    feedEl.appendChild(node);
  });

  /* ───── nav scroll behavior ───── */
  const nav = document.getElementById('nav');
  let lastY = 0; let ticking = false;
  function onScroll() {
    const y = window.scrollY;
    nav.classList.toggle('scrolled', y > 24);
    if (y > 200 && y > lastY + 4) nav.classList.add('hidden');
    else if (y < lastY - 2 || y < 80) nav.classList.remove('hidden');
    lastY = y; ticking = false;
  }
  window.addEventListener('scroll', () => {
    if (!ticking) { requestAnimationFrame(onScroll); ticking = true; }
  }, { passive: true });

  /* ───── reveal anim ───── */
  const io = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); }
    });
  }, { threshold: 0.10, rootMargin: "0px 0px -6% 0px" });
  document.querySelectorAll('.reveal').forEach(el => io.observe(el));

  /* ───── language toggle ───── */
  const langBtn = document.getElementById('langToggle');
  const html = document.documentElement;
  langBtn.addEventListener('click', () => {
    const cur = html.getAttribute('data-lang') === 'zh' ? 'en' : 'zh';
    html.setAttribute('data-lang', cur);
    html.setAttribute('lang', cur === 'zh' ? 'zh-CN' : 'en');
    langBtn.querySelectorAll('span[data-lang-btn]').forEach(s => {
      s.classList.toggle('active', s.dataset.langBtn === cur);
    });
  });
</script>

</body>
</html>
