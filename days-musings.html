<!doctype html>
<html lang="zh-CN" data-lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>浮生漫旅 · TEMPO</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Liu+Jian+Mao+Cao&family=Long+Cang&family=Ma+Shan+Zheng&display=swap" rel="stylesheet" />
<style>
  :root {
    /* paper & ink — musing: 灰米 (cooler / contemplative) */
    --paper:        #E8E1D2;
    --paper-deep:   #D5CBB6;
    --paper-soft:   #EFE9DA;
    --paper-warm:   #DED3BC;
    --ink:          #1B1714;
    --ink-soft:     #4B4239;
    --ink-faint:    #8A7C6C;
    --rule:         #C4B8A1;

    /* musing accent: deep umber */
    --accent:       #5A4B3E;
    --accent-deep:  #3D3326;
    --accent-wash:  #9B8A77;
    --seal-red:     #8E3023;

    --serif-zh: "Noto Serif SC", "Songti SC", "STSong", serif;
    --serif-en: "Cormorant Garamond", "Noto Serif SC", serif;
    --hand:     "Liu Jian Mao Cao", "Noto Serif SC", cursive;
    --hand-2:   "Long Cang", "Noto Serif SC", cursive;
    --brush:    "Ma Shan Zheng", "Noto Serif SC", serif;
    --hand-jl:  "JingLei", "Noto Serif SC", "STKaiti", serif;
    --hand-xs:  "XingShu", "Liu Jian Mao Cao", "Noto Serif SC", cursive;

    --max:  1280px;
    --gut:  clamp(20px, 4vw, 56px);
    --nav-h: 56px;
  }

  /* 方正静蕾简体 — 长篇手写笔记专用 */
  @font-face {
    font-family: "JingLei";
    src: url("fonts/jinglei.woff2") format("woff2");
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }
  /* 方正硬笔行书 — signoff / pull-quote 专用 */
  @font-face {
    font-family: "XingShu";
    src: url("fonts/xingshu.woff2") format("woff2");
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--serif-zh);
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    line-height: 1.85;
    overflow-x: hidden;
  }
  body::before {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    background-image:
      radial-gradient(rgba(60,40,20,0.025) 1px, transparent 1px),
      radial-gradient(rgba(60,40,20,0.018) 1px, transparent 1px);
    background-size: 3px 3px, 5px 5px;
    background-position: 0 0, 1px 2px;
    mix-blend-mode: multiply;
    z-index: 1;
  }
  a { color: inherit; text-decoration: none; }

  /* ───────────── nav ───────────── */
  .nav {
    position: fixed; top: 0; left: 0; right: 0;
    height: var(--nav-h);
    display: flex; align-items: center;
    padding: 0 var(--gut);
    z-index: 50;
    transition: transform .45s ease, background-color .45s ease, backdrop-filter .45s ease, border-color .45s ease;
    border-bottom: 1px solid transparent;
  }
  .nav.scrolled {
    background: rgba(232, 225, 210, 0.78);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-bottom-color: var(--rule);
  }
  .nav.hidden { transform: translateY(-100%); }
  .nav-inner {
    width: 100%; max-width: var(--max); margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    gap: 24px;
  }
  .brand {
    font-family: var(--serif-en);
    font-size: 18px; letter-spacing: 0.32em;
    font-weight: 400; text-transform: uppercase;
    color: var(--ink);
  }
  .brand .dot { display: inline-block; width: 5px; height: 5px;
    background: var(--ink); border-radius: 50%;
    transform: translateY(-2px); margin: 0 8px; }
  .brand .zh { font-family: var(--serif-zh); letter-spacing: 0.4em; font-size: 14px; color: var(--ink-soft); }
  .nav-links { display: flex; align-items: center; gap: 28px;
    font-size: 13.5px; color: var(--ink-soft); font-weight: 400; }
  .nav-links a { position: relative; padding: 4px 0; transition: color .25s ease; }
  .nav-links a::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: -2px;
    height: 1px; background: var(--ink);
    transform: scaleX(0); transform-origin: left;
    transition: transform .35s ease;
  }
  .nav-links a:hover { color: var(--ink); }
  .nav-links a:hover::after { transform: scaleX(1); }
  .nav-links a.is-active { color: var(--ink); }
  .nav-links a.is-active::after { transform: scaleX(1); background: var(--accent); }

  .lang {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--serif-en); font-size: 12px;
    letter-spacing: 0.2em; color: var(--ink-faint);
    cursor: pointer; user-select: none;
    border: none; background: none; padding: 4px 8px;
  }
  .lang span { transition: color .25s ease; }
  .lang .active { color: var(--ink); }
  .lang .sep { color: var(--ink-faint); }

  /* ───────────── breadcrumb ───────────── */
  .crumb {
    max-width: var(--max);
    margin: 0 auto;
    padding: calc(var(--nav-h) + 32px) var(--gut) 0;
    display: flex; align-items: center; gap: 14px;
    font-family: var(--serif-en);
    font-size: 11.5px;
    letter-spacing: 0.4em;
    color: var(--ink-faint);
    text-transform: uppercase;
  }
  .crumb a { transition: color .25s ease; }
  .crumb a:hover { color: var(--ink); }
  .crumb .sep { width: 18px; height: 1px; background: var(--ink-faint); display: inline-block; }

  /* ───────────── diary head (slim) ───────────── */
  .diary-head {
    max-width: 720px;
    margin: 0 auto;
    padding: calc(var(--nav-h) + 36px) var(--gut) 7vh;
    display: flex; flex-direction: column;
    align-items: flex-start;
    gap: 6px;
  }
  .diary-back {
    font-family: var(--serif-en);
    font-size: 11px; letter-spacing: 0.35em;
    color: var(--ink-faint);
    text-transform: uppercase;
    padding: 4px 0;
    transition: color .25s ease;
  }
  .diary-back:hover { color: var(--accent-deep); }
  .diary-name {
    font-family: var(--serif-zh);
    font-weight: 400;
    font-size: clamp(22px, 2.1vw, 28px);
    letter-spacing: 0.32em;
    margin: 6px 0 0;
    color: var(--ink);
    line-height: 1.2;
  }
  [data-lang="en"] .diary-name {
    font-family: var(--serif-en); font-style: italic; letter-spacing: 0.04em;
  }
  .diary-en {
    font-family: var(--serif-en);
    font-style: italic;
    font-size: 12px; letter-spacing: 0.22em;
    color: var(--ink-faint);
    text-transform: lowercase;
  }
  [data-lang="en"] .diary-en { display: none; }

  /* ───────────── hero ───────────── */
  .hero {
    max-width: var(--max);
    margin: 0 auto;
    padding: 4vh var(--gut) 6vh;
    display: grid;
    grid-template-columns: 1fr 1.05fr;
    gap: clamp(40px, 6vw, 80px);
    align-items: center;
  }
  .hero-art {
    position: relative;
    aspect-ratio: 4 / 5;
    width: 100%;
    max-height: 64vh;
    overflow: hidden;
    background: var(--paper-soft);
  }
  .hero-art svg.wash { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

  .section-mark {
    font-family: var(--serif-en);
    font-size: 11px; letter-spacing: 0.5em;
    color: var(--ink-faint);
    text-transform: uppercase;
    margin-bottom: 22px;
  }
  .hero-title {
    font-family: var(--serif-zh);
    font-weight: 400;
    font-size: clamp(40px, 5.4vw, 68px);
    line-height: 1.1;
    letter-spacing: 0.4em;
    margin: 0 0 12px;
    color: var(--ink);
  }
  .hero-title-en {
    font-family: var(--serif-en);
    font-style: italic;
    font-weight: 300;
    font-size: clamp(18px, 1.8vw, 22px);
    letter-spacing: 0.2em;
    color: var(--ink-soft);
    margin-bottom: 28px;
  }
  .hero-divider { width: 38px; height: 1px; background: var(--accent); opacity: 0.6; margin: 0 0 24px; }
  .hero-prose {
    font-size: clamp(14.5px, 1.1vw, 16px);
    line-height: 2.1;
    color: var(--ink-soft);
    max-width: 38ch;
    font-weight: 300;
  }
  .hero-prose p + p { margin-top: 1em; }
  .hero-prose .accent { font-family: var(--hand); font-size: 1.3em; color: var(--accent); line-height: 1.5; }

  /* ───────────── timeline / pages ───────────── */
  .pages-head {
    max-width: var(--max);
    margin: 4vh auto 6vh;
    padding: 0 var(--gut);
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 24px;
  }
  .pages-head .label {
    font-family: var(--serif-zh);
    font-weight: 300;
    font-size: 18px;
    letter-spacing: 0.5em;
    margin: 0;
  }
  .pages-head .meta {
    font-family: var(--serif-en);
    font-size: 11px; letter-spacing: 0.4em;
    color: var(--ink-faint);
    text-transform: uppercase;
  }

  .pages {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 var(--gut) 16vh;
    display: flex; flex-direction: column;
    gap: clamp(70px, 9vh, 120px);
  }

  .page {
    position: relative;
    padding-top: 36px;
  }

  .page-date {
    position: absolute;
    top: 0; left: 0;
    font-family: var(--serif-en);
    font-style: italic;
    font-size: 12.5px;
    letter-spacing: 0.22em;
    color: var(--ink-faint);
  }
  .page-mark {
    position: absolute;
    top: 0; right: 0;
    font-family: var(--serif-en);
    font-size: 10.5px;
    letter-spacing: 0.4em;
    color: var(--ink-faint);
    text-transform: uppercase;
  }

  /* essay entry — long-form letter, left-aligned, JingLei body */
  .page.m-essay {
    padding-top: 44px;
  }
  .page.m-essay .essay-title {
    font-family: var(--serif-zh);
    font-weight: 400;
    font-size: clamp(22px, 2.4vw, 30px);
    letter-spacing: 0.22em;
    color: var(--ink);
    margin: 0 0 4px;
    text-align: center;
    line-height: 1.4;
  }
  .page.m-essay .essay-title-en {
    text-align: center;
    font-family: var(--serif-en);
    font-style: italic;
    font-size: clamp(14px, 1.2vw, 16px);
    letter-spacing: 0.12em;
    color: var(--ink-faint);
    margin-bottom: 36px;
  }
  [data-lang="en"] .page.m-essay .essay-title { display: none; }
  [data-lang="en"] .page.m-essay .essay-title-en {
    font-style: normal;
    font-weight: 400;
    font-size: clamp(22px, 2vw, 28px);
    letter-spacing: 0.06em;
    color: var(--ink);
    margin-bottom: 36px;
  }
  .page.m-essay .body {
    font-family: var(--hand-jl);
    font-weight: 400;
    font-size: clamp(15.5px, 1.15vw, 17.5px);
    line-height: 2.05;
    color: var(--ink-soft);
    letter-spacing: 0.04em;
    max-width: 36em;
    margin: 0 auto;
    text-align: left;
  }
  [data-lang="en"] .page.m-essay .body {
    font-family: var(--serif-en);
    font-style: italic;
    font-size: clamp(16px, 1.25vw, 18px);
    letter-spacing: 0.01em;
    line-height: 1.85;
  }
  .page.m-essay .body p + p { margin-top: 1.3em; }
  .page.m-essay .signoff {
    display: block;
    text-align: right;
    font-family: var(--hand-xs);
    color: var(--accent);
    font-size: 28px;
    margin: 32px auto 0;
    max-width: 36em;
    letter-spacing: 0.04em;
  }
  [data-lang="en"] .page.m-essay .signoff {
    font-family: var(--serif-en);
    font-style: italic;
    font-size: 22px;
  }

  /* musing entry — text-centered prose */
  .page.m-musing {
    text-align: center;
  }
  .page.m-musing .body {
    font-family: var(--serif-zh);
    font-weight: 300;
    font-size: clamp(15.5px, 1.2vw, 18px);
    line-height: 2.1;
    color: var(--ink);
    letter-spacing: 0.05em;
    max-width: 32em;
    margin: 24px auto 0;
  }
  [data-lang="en"] .page.m-musing .body {
    font-family: var(--serif-en);
    font-size: clamp(16px, 1.25vw, 19px);
    letter-spacing: 0.01em;
  }
  .page.m-musing .body p + p { margin-top: 1.3em; }
  .page.m-musing .signoff {
    font-family: var(--hand);
    color: var(--accent);
    font-size: 18px;
    margin-top: 22px;
    letter-spacing: 0.05em;
    line-height: 1.6;
  }
  [data-lang="en"] .page.m-musing .signoff {
    font-family: var(--serif-en); font-style: italic; font-size: 16px;
  }

  /* achievement entry — small image + brief caption */
  .page.m-achieve {
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: clamp(30px, 4vw, 56px);
    align-items: start;
  }
  .page.m-achieve .ach-img {
    aspect-ratio: 4 / 5;
    overflow: hidden;
    background: var(--paper-warm);
    box-shadow: 0 14px 24px -20px rgba(60,40,20,0.32);
    margin-top: 36px;
  }
  .page.m-achieve .ach-img svg { width: 100%; height: 100%; display: block; }

  .page.m-achieve .ach-text {
    padding-top: 36px;
  }
  .page.m-achieve .ach-stamp {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--brush);
    font-size: 14px;
    color: var(--seal-red);
    letter-spacing: 0.18em;
    background: rgba(142, 48, 35, 0.06);
    padding: 4px 10px;
    border: 0.5px solid rgba(142, 48, 35, 0.35);
    margin-bottom: 14px;
  }
  [data-lang="en"] .page.m-achieve .ach-stamp {
    font-family: var(--serif-en); font-style: italic; font-size: 12px; letter-spacing: 0.2em;
  }
  .page.m-achieve .ach-title {
    font-family: var(--serif-zh);
    font-weight: 400;
    font-size: clamp(20px, 1.7vw, 24px);
    letter-spacing: 0.16em;
    line-height: 1.5;
    margin: 0 0 14px;
    color: var(--ink);
  }
  [data-lang="en"] .page.m-achieve .ach-title {
    font-family: var(--serif-en); font-style: italic; letter-spacing: 0.04em;
  }
  .page.m-achieve .ach-note {
    font-family: var(--serif-zh);
    font-size: 14.5px;
    line-height: 1.95;
    color: var(--ink-soft);
    letter-spacing: 0.04em;
    max-width: 30em;
  }
  [data-lang="en"] .page.m-achieve .ach-note { font-family: var(--serif-en); font-size: 15.5px; }
  .page.m-achieve .ach-aside {
    font-family: var(--hand);
    color: var(--accent);
    font-size: 15px;
    margin-top: 14px;
    line-height: 1.6;
  }
  [data-lang="en"] .page.m-achieve .ach-aside { font-family: var(--serif-en); font-style: italic; font-size: 14px; }

  /* small ornament between pages */
  .ornament {
    margin: 0 auto;
    display: flex; align-items: center; justify-content: center;
    gap: 14px;
    color: var(--ink-faint);
    opacity: 0.55;
  }
  .ornament .dot {
    width: 4px; height: 4px;
    background: var(--accent-wash);
    border-radius: 50%;
    display: inline-block;
  }
  .ornament .rule {
    width: 36px; height: 1px;
    background: var(--rule);
    display: inline-block;
  }

  /* ───────────── reveal anim ───────────── */
  .reveal {
    opacity: 0; transform: translateY(28px);
    transition: opacity 1.1s ease, transform 1.1s cubic-bezier(.2,.7,.2,1);
  }
  .reveal.in { opacity: 1; transform: translateY(0); }
  .reveal.delay-1 { transition-delay: .14s; }
  .reveal.delay-2 { transition-delay: .28s; }
  .reveal.delay-3 { transition-delay: .42s; }

  /* ───────────── i18n ───────────── */
  [data-lang="zh"] .en-only { display: none; }
  [data-lang="en"] .zh-only { display: none; }
  [data-lang="en"] body { font-family: var(--serif-en); }
  [data-lang="en"] .nav-links a, [data-lang="en"] .hero-prose {
    font-family: var(--serif-en);
  }
  [data-lang="en"] .hero-title { display: none; }
  [data-lang="en"] .hero-title-en { font-style: normal; font-weight: 300; }
  [data-lang="en"] .pages-head .label { font-family: var(--serif-en); font-style: italic; letter-spacing: 0.18em; }
  [data-lang="en"] .brand .zh { display: none; }

  /* ───────────── empty state ───────────── */
  .empty-state {
    text-align: center;
    padding: 14vh 0 18vh;
    color: var(--ink-faint);
  }
  .empty-state .empty-mark {
    font-family: var(--serif-en);
    font-size: 28px;
    letter-spacing: 0.5em;
    opacity: 0.55;
    margin-bottom: 16px;
  }
  .empty-state p {
    font-family: var(--serif-zh);
    font-size: 14px;
    letter-spacing: 0.3em;
    margin: 0;
  }
  [data-lang="en"] .empty-state p { font-family: var(--serif-en); font-style: italic; letter-spacing: 0.18em; }

  /* ───────────── responsive ───────────── */
  @media (max-width: 760px) {
    .page.m-achieve {
      grid-template-columns: 1fr;
      gap: 22px;
    }
    .page.m-achieve .ach-img {
      max-width: 240px;
      margin-top: 36px;
    }
    .page.m-achieve .ach-text { padding-top: 4px; }
    .hero { grid-template-columns: 1fr; padding-top: 0; gap: 36px; }
    .hero-art { aspect-ratio: 4 / 4; max-height: 52vh; }
    .nav-links a:not(.lang-wrap) { display: none; }
  }
</style>
</head>

        "今天是我和妈妈的第二十八个母亲节。我很想写一点东西，来记录下我感受到的母女特殊的情感联结。大概要从很久很久之前说起，那时候我甚至没有血肉。我只能从她讲起「当年」时眼角绽放的幸福里，从他人文字里对她的苛刻或赞美中，构筑出一个想象。",

        "在亲子的关系中，有人学着怎样被爱、有人学着怎样维护爱、有人学着如何走出伤痛、有人学着如何呼吸。而我学的是从家里出走，然后记住那些彼此需要的特殊时刻，说一句："
      ],
      bodyEn: [
        "Today is the twenty-eighth Mother&rsquo;s Day my mom and I have shared. I&rsquo;ve wanted to write something — to record the particular bond I feel between mother and daughter. The story has to start a long time ago, before I had flesh and blood. I can only piece together an image from the happiness that bloomed at the corners of her eyes whenever she spoke of &ldquo;back then,&rdquo; and from how others, in writing, were either harsh on her or praised her.",
        "How much love must she have carried me with? She read about prenatal music theory, and so for days she lay in bed cradling a black tape recorder, looping a Mozart cassette, fanning herself with a palm-leaf fan, and falling asleep mid-fan. Half-dozing, she would think she should also be studying alongside her unborn child, so she would force her lashes apart and let the high art wash over her. She and my dad often called to me through her belly. They tell it now, smiling: &ldquo;You could hear us back then for sure — your little hand would push out against the skin and high-five us. It was so cute.&rdquo; A hand appearing on the belly! Honestly it sounds eerie, and I half-suspect they&rsquo;ve bent their own memory — between me and the air there were eight layers of flesh; how could a hand leave a mark? But they feel none of the strangeness — only the joy. So that vague, doubtful hand reached across decades and pulled them, from the chicken-feathered exhaustion of middle age, back to the expectations of their youth.",
        "She imagined what kind of child I might be, and naïvely petitioned every god and spirit: nothing else, only that her child be healthy and happy — and if she could ask one more thing, then maybe a little smart, a little pretty… but each time she got there she scolded herself for being greedy, worried the gods might miss the important parts, and added emphasis on &ldquo;healthy&rdquo; and &ldquo;happy&rdquo; to repeat them. They had no money then, life was hard, but they didn&rsquo;t worry about the future. The first thing on their mind was anticipation — anticipation of my birth, of finding traces of themselves and their beloved in my eyes, of my laugh, of their love flowing through me.",
        "From middle school on I started reading literature about complicated, tangled mother-daughter relationships — love laced with resentment. But she wasn&rsquo;t like that. She loves me purely, clumsily, hard. She wasn&rsquo;t much educated, never sought out the great books, but she knew, by some instinct, that the suffering she had endured had nothing to do with me. She tells me I am the most precious choice of her life, but she never expects me to save her. She knows I&rsquo;m not hers — and so she learns to hold down her own anxiety and let me walk my own road. She wonders whether she held me too tight, whether she was too weak to protect me. I tell her: no — how could I ever demand that you be perfect? How could I demand that you give me everything from a place that was not happy or whole? With this love behind me, I am already happy and fulfilled. From it I have the courage to weather storms, the courage to keep mending myself. This invisible thread of blood keeps sending me strength — what a wondrous thing.",
        "I love her deeply, and she loves me deeply, but our love is not some heaven-and-earth, one-of-a-kind exception — it&rsquo;s the bond every mother-daughter pair who respect and love each other can feel. For a while, in a flood of gratitude, I sanctified it. But growing up a little more, I saw that the myth-making was a cage for both of us. It bound my mother to a role of endless giving — she had to keep offering herself in order to complete the illusion in my head — and it loaded me with the weight of love&rsquo;s debt, fenced me in a moral lowland where everything had to be &ldquo;repaid.&rdquo; Who profits from chasing that kind of purity and perfection? I see her flaws, accept some of them, and forgive myself for the ones I can&rsquo;t accept. But seeing, accepting, or shrugging — none of it changes how we live together or how we hold each other up. She, in her own way, does the same: she sees me, and she lets me go. The day I understood this, I finally grew out of the role of &ldquo;child.&rdquo; We are two independent, mature people who no longer wish to change each other or hold each other tight. We can respond to and support each other — or refuse each other&rsquo;s emotions.",
        "Inside the parent-child relationship, some learn how to be loved, some learn how to keep love going, some learn how to walk out of pain, some learn how to breathe. What I&rsquo;ve been learning is how to leave home — and then to remember those particular moments when we needed each other, and to say:"

        <p><span class="zh-only">尚未上传</span><span class="en-only">Nothing here yet</span></p>

  } else {
    entries.forEach((e, i) => {
      const node = document.createElement("article");
      node.className = `page m-${e.type} reveal`;
      if (e.type === "essay") {

        node.innerHTML = `

          <span class="page-mark">${e.mark}</span>

          <div class="body">
            <div class="zh-only">${bodyZh}</div>

          </div>

        `;
      }
      pagesEl.appendChild(node);
    });
  }

  /* ───── nav scroll behavior ───── */
  const nav = document.getElementById('nav');
  let lastY = 0; let ticking = false;
  function onScroll() {
    const y = window.scrollY;
    nav.classList.toggle('scrolled', y > 24);
    if (y > 200 && y > lastY + 4) nav.classList.add('hidden');
    else if (y < lastY - 2 || y < 80) nav.classList.remove('hidden');
    lastY = y; ticking = false;
  }
  window.addEventListener('scroll', () => {
    if (!ticking) { requestAnimationFrame(onScroll); ticking = true; }
  }, { passive: true });

  /* ───── reveal anim ───── */
  const io = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); }
    });
  }, { threshold: 0.10, rootMargin: "0px 0px -6% 0px" });
  document.querySelectorAll('.reveal').forEach(el => io.observe(el));

  /* ───── language toggle ───── */
  const langBtn = document.getElementById('langToggle');
  const html = document.documentElement;
  langBtn.addEventListener('click', () => {
    const cur = html.getAttribute('data-lang') === 'zh' ? 'en' : 'zh';
    html.setAttribute('data-lang', cur);
    html.setAttribute('lang', cur === 'zh' ? 'zh-CN' : 'en');
    langBtn.querySelectorAll('span[data-lang-btn]').forEach(s => {
      s.classList.toggle('active', s.dataset.langBtn === cur);
    });
  });
</script>
