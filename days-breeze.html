<!doctype html>
<html lang="zh-CN" data-lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>微风日记 · TEMPO</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Liu+Jian+Mao+Cao&family=Long+Cang&display=swap" rel="stylesheet" />
<style>
  :root {
    /* paper & ink — breeze: 淡青芽 sage tint */
    --paper:        #EAEEDD;
    --paper-deep:   #D8DEC4;
    --paper-soft:   #F0F3E2;
    --paper-warm:   #DEE3C8;
    --ink:          #1B1714;
    --ink-soft:     #4B4239;
    --ink-faint:    #8B8B72;
    --rule:         #C7CEAB;

    /* breeze accent: olive green family */
    --accent:       #6E7A45;
    --accent-deep:  #4D5832;
    --accent-wash:  #A8B07F;

    --serif-zh: "Noto Serif SC", "Songti SC", "STSong", serif;
    --serif-en: "Cormorant Garamond", "Noto Serif SC", serif;
    --hand:     "Liu Jian Mao Cao", "Noto Serif SC", cursive;
    --hand-2:   "Long Cang", "Noto Serif SC", cursive;
    --hand-jl:  "JingLei", "Noto Serif SC", "STKaiti", serif;

    --max:  1280px;
    --gut:  clamp(20px, 4vw, 56px);
    --nav-h: 56px;
  }

  /* 方正静蕾简体（子集化）— 长篇手写笔记专用 */
  @font-face {
    font-family: "JingLei";
    src: url("fonts/jinglei.woff2") format("woff2");
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--serif-zh);
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    line-height: 1.7;
    overflow-x: hidden;
  }
  body::before {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    background-image:
      radial-gradient(rgba(60,60,30,0.025) 1px, transparent 1px),
      radial-gradient(rgba(60,60,30,0.018) 1px, transparent 1px);
    background-size: 3px 3px, 5px 5px;
    background-position: 0 0, 1px 2px;
    mix-blend-mode: multiply;
    z-index: 1;
  }
  a { color: inherit; text-decoration: none; }

  /* ───────────── nav ───────────── */
  .nav {
    position: fixed; top: 0; left: 0; right: 0;
    height: var(--nav-h);
    display: flex; align-items: center;
    padding: 0 var(--gut);
    z-index: 50;
    transition: transform .45s ease, background-color .45s ease, backdrop-filter .45s ease, border-color .45s ease;
    border-bottom: 1px solid transparent;
  }
  .nav.scrolled {
    background: rgba(234, 238, 221, 0.78);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-bottom-color: var(--rule);
  }
  .nav.hidden { transform: translateY(-100%); }
  .nav-inner {
    width: 100%; max-width: var(--max); margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    gap: 24px;
  }
  .brand {
    font-family: var(--serif-en);
    font-size: 18px; letter-spacing: 0.32em;
    font-weight: 400; text-transform: uppercase;
    color: var(--ink);
  }
  .brand .dot { display: inline-block; width: 5px; height: 5px;
    background: var(--ink); border-radius: 50%;
    transform: translateY(-2px); margin: 0 8px; }
  .brand .zh { font-family: var(--serif-zh); letter-spacing: 0.4em; font-size: 14px; color: var(--ink-soft); }
  .nav-links { display: flex; align-items: center; gap: 28px;
    font-size: 13.5px; color: var(--ink-soft); font-weight: 400; }
  .nav-links a { position: relative; padding: 4px 0; transition: color .25s ease; }
  .nav-links a::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: -2px;
    height: 1px; background: var(--ink);
    transform: scaleX(0); transform-origin: left;
    transition: transform .35s ease;
  }
  .nav-links a:hover { color: var(--ink); }
  .nav-links a:hover::after { transform: scaleX(1); }
  .nav-links a.is-active { color: var(--ink); }
  .nav-links a.is-active::after { transform: scaleX(1); background: var(--accent); }

  .lang {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--serif-en); font-size: 12px;
    letter-spacing: 0.2em; color: var(--ink-faint);
    cursor: pointer; user-select: none;
    border: none; background: none; padding: 4px 8px;
  }
  .lang span { transition: color .25s ease; }
  .lang .active { color: var(--ink); }
  .lang .sep { color: var(--ink-faint); }

  /* ───────────── breadcrumb ───────────── */
  .crumb {
    max-width: var(--max);
    margin: 0 auto;
    padding: calc(var(--nav-h) + 32px) var(--gut) 0;
    display: flex; align-items: center; gap: 14px;
    font-family: var(--serif-en);
    font-size: 11.5px;
    letter-spacing: 0.4em;
    color: var(--ink-faint);
    text-transform: uppercase;
  }
  .crumb a { transition: color .25s ease; }
  .crumb a:hover { color: var(--ink); }
  .crumb .sep { width: 18px; height: 1px; background: var(--ink-faint); display: inline-block; }

  /* ───────────── diary head (slim) ───────────── */
  .diary-head {
    max-width: 980px;
    margin: 0 auto;
    padding: calc(var(--nav-h) + 36px) var(--gut) 7vh;
    display: flex; flex-direction: column;
    align-items: flex-start;
    gap: 6px;
  }
  .diary-back {
    font-family: var(--serif-en);
    font-size: 11px; letter-spacing: 0.35em;
    color: var(--ink-faint);
    text-transform: uppercase;
    padding: 4px 0;
    transition: color .25s ease;
  }
  .diary-back:hover { color: var(--accent-deep); }
  .diary-name {
    font-family: var(--serif-zh);
    font-weight: 400;
    font-size: clamp(22px, 2.1vw, 28px);
    letter-spacing: 0.32em;
    margin: 6px 0 0;
    color: var(--ink);
    line-height: 1.2;
  }
  [data-lang="en"] .diary-name {
    font-family: var(--serif-en); font-style: italic; letter-spacing: 0.04em;
  }
  .diary-en {
    font-family: var(--serif-en);
    font-style: italic;
    font-size: 12px; letter-spacing: 0.22em;
    color: var(--ink-faint);
    text-transform: lowercase;
  }
  [data-lang="en"] .diary-en { display: none; }

  /* ───────────── hero ───────────── */
  .hero {
    max-width: var(--max);
    margin: 0 auto;
    padding: 4vh var(--gut) 8vh;
    display: grid;
    grid-template-columns: 1fr 1.05fr;
    gap: clamp(40px, 6vw, 80px);
    align-items: center;
  }
  .hero-art {
    position: relative;
    aspect-ratio: 5 / 4;
    width: 100%;
    max-height: 60vh;
    overflow: hidden;
    background: var(--paper-soft);
  }
  .hero-art svg.wash { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

  .section-mark {
    font-family: var(--serif-en);
    font-size: 11px; letter-spacing: 0.5em;
    color: var(--ink-faint);
    text-transform: uppercase;
    margin-bottom: 22px;
  }
  .hero-title {
    font-family: var(--serif-zh);
    font-weight: 400;
    font-size: clamp(40px, 5.4vw, 68px);
    line-height: 1.1;
    letter-spacing: 0.4em;
    margin: 0 0 12px;
    color: var(--ink);
  }
  .hero-title-en {
    font-family: var(--serif-en);
    font-style: italic;
    font-weight: 300;
    font-size: clamp(18px, 1.8vw, 22px);
    letter-spacing: 0.2em;
    color: var(--ink-soft);
    margin-bottom: 28px;
  }
  .hero-divider { width: 38px; height: 1px; background: var(--accent); opacity: 0.6; margin: 0 0 24px; }
  .hero-prose {
    font-size: clamp(14.5px, 1.1vw, 16px);
    line-height: 2.1;
    color: var(--ink-soft);
    max-width: 38ch;
    font-weight: 300;
  }
  .hero-prose p + p { margin-top: 1em; }
  .hero-prose .accent { font-family: var(--hand); font-size: 1.3em; color: var(--accent); line-height: 1.5; }

  /* ───────────── log feed ───────────── */
  .log-head {
    max-width: var(--max);
    margin: 4vh auto 5vh;
    padding: 0 var(--gut);
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 24px;
  }
  .log-head .label {
    font-family: var(--serif-zh);
    font-weight: 300;
    font-size: 18px;
    letter-spacing: 0.5em;
    margin: 0;
  }
  .log-head .meta {
    font-family: var(--serif-en);
    font-size: 11px; letter-spacing: 0.4em;
    color: var(--ink-faint);
    text-transform: uppercase;
  }

  .feed {
    max-width: 980px;
    margin: 0 auto;
    padding: 0 var(--gut) 16vh;
    display: flex; flex-direction: column;
    gap: clamp(64px, 9vh, 110px);
  }

  .entry {
    display: grid;
    grid-template-columns: 1.25fr 1fr;
    gap: clamp(32px, 5vw, 64px);
    align-items: center;
  }
  .entry.flip { grid-template-columns: 1fr 1.25fr; }
  .entry.flip .entry-art { order: 2; }
  .entry.flip .entry-text { order: 1; }

  .entry-art {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    overflow: hidden;
    background: var(--paper-warm);
    box-shadow: 0 18px 30px -22px rgba(60,60,30,0.3);
    transition: transform .8s cubic-bezier(.2,.7,.2,1);
  }
  .entry:hover .entry-art { transform: translateY(-3px); }
  .entry-art svg { width: 100%; height: 100%; display: block; }
  .entry-art video {
    width: 100%; height: 100%;
    display: block;
    object-fit: cover;
    background: var(--ink);
  }
  .entry-art.is-video { transition: none; }
  .entry-art.is-video:hover { transform: none; }

  /* play hint — a faint circle in lower-right */
  .entry-art .play {
    position: absolute;
    right: 14px; bottom: 14px;
    width: 36px; height: 36px;
    border: 1px solid rgba(255,255,255,0.55);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(2px);
    background: rgba(0,0,0,0.18);
    transition: background .35s ease;
  }
  .entry-art .play::before {
    content: "";
    width: 0; height: 0;
    border-left: 8px solid #fff;
    border-top: 5px solid transparent;
    border-bottom: 5px solid transparent;
    margin-left: 2px;
  }
  .entry:hover .entry-art .play { background: rgba(0,0,0,0.32); }

  .entry-text {
    display: flex; flex-direction: column;
    gap: 14px;
  }
  .entry-date {
    font-family: var(--serif-en);
    font-style: italic;
    font-size: 13px; letter-spacing: 0.18em;
    color: var(--ink-faint);
  }
  .entry-title {
    font-family: var(--serif-zh);
    font-weight: 400;
    font-size: clamp(22px, 2vw, 28px);
    letter-spacing: 0.18em;
    color: var(--ink);
    margin: 0;
    line-height: 1.4;
  }
  .entry-note {
    font-family: var(--hand);
    font-size: 17px;
    color: var(--accent-deep);
    line-height: 1.7;
    letter-spacing: 0.04em;
    margin-top: 4px;
  }
  [data-lang="en"] .entry-note { font-family: var(--serif-en); font-style: italic; font-size: 15px; color: var(--accent-deep); letter-spacing: 0.04em; }

  /* 长篇手写笔记 — 静蕾体（清晰、可读，比 Liu Jian Mao Cao 易读） */
  .entry-note-long {
    font-family: var(--hand-jl);
    font-size: 16.5px;
    color: var(--ink-soft);
    line-height: 2;
    letter-spacing: 0.03em;
    margin-top: 6px;
  }
  .entry-note-long p {
    margin: 0 0 0.85em 0;
  }
  .entry-note-long p:last-child { margin-bottom: 0; }
  [data-lang="en"] .entry-note-long {
    font-family: var(--serif-en);
    font-style: italic;
    font-size: 15px;
    line-height: 1.85;
  }

  .entry-place {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: var(--serif-en);
    font-size: 11px; letter-spacing: 0.32em;
    color: var(--ink-faint);
    text-transform: uppercase;
    margin-top: 4px;
  }
  .entry-place::before {
    content: ""; display: inline-block;
    width: 18px; height: 1px; background: var(--ink-faint);
  }

  .entry-links {
    display: flex; align-items: center; gap: 18px;
    margin-top: 12px;
  }
  .link-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 16px;
    border: 1px solid var(--accent);
    color: var(--accent-deep);
    font-family: var(--serif-zh);
    font-size: 13px;
    letter-spacing: 0.18em;
    transition: background .35s ease, color .35s ease;
  }
  [data-lang="en"] .link-btn { font-family: var(--serif-en); letter-spacing: 0.1em; font-style: italic; }
  .link-btn:hover { background: var(--accent); color: var(--paper-soft); }
  .link-btn .arrow { font-family: var(--serif-en); font-size: 14px; }

  .link-secondary {
    font-family: var(--serif-en);
    font-style: italic;
    font-size: 12px; letter-spacing: 0.16em;
    color: var(--ink-faint);
    transition: color .25s ease;
    border-bottom: 1px solid transparent;
    padding-bottom: 1px;
  }
  .link-secondary:hover { color: var(--accent-deep); border-bottom-color: var(--accent); }

  /* ───────────── reveal anim ───────────── */
  .reveal {
    opacity: 0; transform: translateY(28px);
    transition: opacity 1.1s ease, transform 1.1s cubic-bezier(.2,.7,.2,1);
  }
  .reveal.in { opacity: 1; transform: translateY(0); }
  .reveal.delay-1 { transition-delay: .14s; }
  .reveal.delay-2 { transition-delay: .28s; }
  .reveal.delay-3 { transition-delay: .42s; }

  /* ───────────── i18n ───────────── */
  [data-lang="zh"] .en-only { display: none; }
  [data-lang="en"] .zh-only { display: none; }
  [data-lang="en"] body { font-family: var(--serif-en); }
  [data-lang="en"] .nav-links a, [data-lang="en"] .hero-prose, [data-lang="en"] .entry-title {
    font-family: var(--serif-en);
  }
  [data-lang="en"] .entry-title { letter-spacing: 0.04em; font-style: italic; }
  [data-lang="en"] .hero-title { display: none; }
  [data-lang="en"] .hero-title-en { font-style: normal; font-weight: 300; }
  [data-lang="en"] .log-head .label { font-family: var(--serif-en); font-style: italic; letter-spacing: 0.18em; }
  [data-lang="en"] .brand .zh { display: none; }

  /* ───────────── photo essay (full-width, prose interleaved with photos) ───────────── */
  .entry.essay {
    display: block;
    max-width: 760px;
    margin: 0 auto;
  }
  .entry.essay .entry-text {
    display: block;
    width: 100%;
    gap: 0;
  }
  .entry.essay .entry-title {
    margin-bottom: 6px;
  }
  .entry-essay-body {
    font-family: var(--hand-jl);
    font-size: 16.5px;
    color: var(--ink-soft);
    line-height: 2;
    letter-spacing: 0.03em;
    margin-top: 18px;
  }
  .entry-essay-body p {
    margin: 0 0 1.1em 0;
  }
  .entry-essay-body p:last-child { margin-bottom: 0; }
  [data-lang="en"] .entry-essay-body {
    font-family: var(--serif-en);
    font-style: italic;
    font-size: 15px;
    line-height: 1.85;
  }
  .entry-photos {
    margin: 28px 0 32px;
    display: grid;
    gap: 10px;
  }
  .entry-photos.cols-1 { grid-template-columns: 1fr; }
  .entry-photos.cols-2 { grid-template-columns: 1fr 1fr; }
  .entry-photos.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
  .entry-photos figure {
    margin: 0;
    overflow: hidden;
    background: var(--paper-warm);
    box-shadow: 0 12px 22px -16px rgba(60,60,30,0.25);
  }
  /* multi-photo grids use a uniform 4:3 box (the source photos are all 4:3 so this never crops) */
  .entry-photos.cols-2 figure, .entry-photos.cols-3 figure { aspect-ratio: 4 / 3; }
  .entry-photos figure img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
  }
  /* a single-photo block is shown at its natural ratio so nothing is cropped — and capped narrower so it doesn't dominate the column */
  .entry-photos.cols-1 { justify-content: center; }
  .entry-photos.cols-1 figure {
    aspect-ratio: auto;
    max-width: 460px;
    margin: 0 auto;
  }
  .entry-photos.cols-1 figure img { height: auto; }
  /* multi-photo rows reset any float left over from inline photos above */
  .entry-photos.cols-2, .entry-photos.cols-3 { clear: both; }

  /* a small photo floated INTO the prose, with text wrapping around it */
  .entry-photo-inline {
    float: right;
    width: clamp(130px, 22%, 180px);
    margin: 6px 0 14px 22px;
    overflow: hidden;
    background: var(--paper-warm);
    box-shadow: 0 12px 22px -16px rgba(60,60,30,0.25);
    shape-outside: margin-box;
  }
  .entry-photo-inline.float-left {
    float: left;
    margin: 6px 22px 14px 0;
  }
  .entry-photo-inline img {
    width: 100%;
    height: auto;
    display: block;
  }
  /* a stack of inline photos, vertically arranged, floated right (or left) as one block */
  .entry-photo-stack {
    float: right;
    width: clamp(130px, 22%, 180px);
    margin: 6px 0 14px 22px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .entry-photo-stack.float-left {
    float: left;
    margin: 6px 22px 14px 0;
  }
  .entry-photo-stack figure {
    margin: 0;
    overflow: hidden;
    background: var(--paper-warm);
    box-shadow: 0 12px 22px -16px rgba(60,60,30,0.25);
  }
  .entry-photo-stack figure img {
    width: 100%;
    height: auto;
    display: block;
  }

  /* ───────────── responsive ───────────── */
  @media (max-width: 760px) {
    .entry, .entry.flip {
      grid-template-columns: 1fr;
      gap: 24px;
    }
    .entry.flip .entry-art { order: 1; }
    .entry.flip .entry-text { order: 2; }
    .hero { grid-template-columns: 1fr; padding-top: 0; gap: 36px; }
    .hero-art { aspect-ratio: 4 / 4; max-height: 52vh; }
    .nav-links a:not(.lang-wrap) { display: none; }
    .entry-photos.cols-3, .entry-photos.cols-2 { grid-template-columns: 1fr; }
    .entry-photo-inline, .entry-photo-inline.float-left,
    .entry-photo-stack, .entry-photo-stack.float-left {
      float: none;
      width: 70%;
      max-width: 280px;
      margin: 16px auto;
    }
  }
</style>
</head>

<!-- shared SVG defs -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <filter id="noise-soft" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="4" />
      <feColorMatrix values="0 0 0 0 0.10  0 0 0 0 0.09  0 0 0 0 0.08  0 0 0 0.05 0" />
      <feComposite in2="SourceGraphic" operator="in" />
    </filter>
    <filter id="noise-fine" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="1.4" numOctaves="2" seed="9" />
      <feColorMatrix values="0 0 0 0 0.12  0 0 0 0 0.10  0 0 0 0 0.08  0 0 0 0.04 0" />
      <feComposite in2="SourceGraphic" operator="in" />
    </filter>
    <filter id="bleed-light" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="5" />
      <feDisplacementMap in="SourceGraphic" scale="9" />
    </filter>
  </defs>
</svg>

<div class="diary-head reveal">

  function renderEssayBody(items) {
    return items.map(item => {

        const figs = item.map(src => `<figure><img src="${src}" alt="" loading="lazy" /></figure>`).join("");
        return `<div class="entry-photos cols-${cols}">${figs}</div>`;
      }
      if (item && typeof item === "object" && item.src) {
        const sideClass = item.inline === "left" ? "float-left" : "float-right";
        return `<figure class="entry-photo-inline ${sideClass}"><img src="${item.src}" alt="" loading="lazy" /></figure>`;
      }
      if (item && typeof item === "object" && Array.isArray(item.stack)) {
        const sideClass = item.side === "left" ? "float-left" : "float-right";
        const figs = item.stack.map(src => `<figure><img src="${src}" alt="" loading="lazy" /></figure>`).join("");
        return `<div class="entry-photo-stack ${sideClass}">${figs}</div>`;
      }
      return `<p>${item}</p>`;
    }).join("");
  }

          <div class="entry-essay-body">
            <div class="zh-only">${renderEssayBody(e.bodyZh)}</div>
            <div class="en-only">${renderEssayBody(e.bodyEn)}</div>
          </div>
          <span class="entry-place"><span class="zh-only">${e.placeZh}</span><span class="en-only">${e.placeEn}</span></span>
        </div>
      `;
      feedEl.appendChild(node);
      return;
    }

    node.className = "entry reveal" + (i % 2 ? " flip" : "");
    if (i % 3 === 1) node.classList.add("delay-1");
    if (i % 3 === 2) node.classList.add("delay-2");

    const artHTML = e.video
      ? `<div class="entry-art is-video" aria-label="${e.titleZh}">
           <video controls preload="metadata" playsinline poster="${e.poster}">
             <source src="${e.video}" type="video/mp4" />
           </video>
         </div>`
      : `<a class="entry-art" href="${e.bili}" target="_blank" rel="noopener" aria-label="${e.titleZh}">
           ${placeholderSVG(e.scene)}
           <span class="play" aria-hidden="true"></span>
         </a>`;

    const noteHTML = e.noteLongZh
      ? `<div class="entry-note-long">
           <span class="zh-only">${e.noteLongZh.map(p => `<p>${p}</p>`).join("")}</span>
           <span class="en-only">${e.noteLongEn.map(p => `<p>${p}</p>`).join("")}</span>
         </div>`
      : `<p class="entry-note"><span class="zh-only">${e.noteZh}</span><span class="en-only">${e.noteEn}</span></p>`;

    const linksHTML = e.noLinks
      ? ``
      : `<div class="entry-links">
           <a class="link-btn" href="${e.bili}" target="_blank" rel="noopener">
             <span><span class="zh-only">B站观看</span><span class="en-only">watch on Bilibili</span></span>
             <span class="arrow">→</span>
           </a>
           <a class="link-secondary" href="${e.xhs}" target="_blank" rel="noopener"><span class="zh-only">小红书</span><span class="en-only">also on Xiaohongshu</span></a>
         </div>`;

    node.innerHTML = `
      ${artHTML}
      <div class="entry-text">
        <span class="entry-date">${e.date}</span>
        <h3 class="entry-title"><span class="zh-only">${e.titleZh}</span><span class="en-only">${e.titleEn}</span></h3>
        ${noteHTML}
        <span class="entry-place"><span class="zh-only">${e.placeZh}</span><span class="en-only">${e.placeEn}</span></span>
        ${linksHTML}
      </div>
    `;
    feedEl.appendChild(node);
  });

  /* ───── nav scroll behavior ───── */
  const nav = document.getElementById('nav');
  let lastY = 0; let ticking = false;
  function onScroll() {
    const y = window.scrollY;
    nav.classList.toggle('scrolled', y > 24);
    if (y > 200 && y > lastY + 4) nav.classList.add('hidden');
    else if (y < lastY - 2 || y < 80) nav.classList.remove('hidden');
    lastY = y; ticking = false;
  }
  window.addEventListener('scroll', () => {
    if (!ticking) { requestAnimationFrame(onScroll); ticking = true; }
  }, { passive: true });

  /* ───── reveal anim ───── */
  const io = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); }
    });
  }, { threshold: 0.10, rootMargin: "0px 0px -6% 0px" });
  document.querySelectorAll('.reveal').forEach(el => io.observe(el));

  /* ───── language toggle ───── */
  const langBtn = document.getElementById('langToggle');
  const html = document.documentElement;
  langBtn.addEventListener('click', () => {
    const cur = html.getAttribute('data-lang') === 'zh' ? 'en' : 'zh';
    html.setAttribute('data-lang', cur);
    html.setAttribute('lang', cur === 'zh' ? 'zh-CN' : 'en');
    langBtn.querySelectorAll('span[data-lang-btn]').forEach(s => {
      s.classList.toggle('active', s.dataset.langBtn === cur);
    });
  });
</script>

</body>
</html>
